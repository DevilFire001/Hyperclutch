<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperClutch Pro Admin Panel</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

/* LOGIN */
.login-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #1e293b;
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  text-align: center;
}

.login-box h1 {
  margin-bottom: 20px;
}

input {
  width: 260px;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

.login-btn {
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#22c55e,#16a34a);
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.error { color:red; margin-top:10px; }

/* DASHBOARD */
.dashboard {
  display: none;
}

.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  position: fixed;
  left: 0;
  top: 0;
  padding: 20px;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  margin-bottom: 30px;
  text-align: center;
}

.nav-btn {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #1e293b;
}

.main {
  margin-left: 240px;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.logout {
  background: #ef4444;
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  color: white;
  cursor: pointer;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.card h3 {
  margin-bottom: 10px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h1>Admin Login</h1>
  <input type="email" id="email" placeholder="Admin Email">
  <input type="password" id="password" placeholder="Password">
  <br>
  <button class="login-btn" onclick="login()">Login</button>
  <div class="error" id="error"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="sidebar">
    <h2>⚡ HyperClutch</h2>
    <a href="admin.html" class="nav-btn">🏆 Tournaments</a>
    <a href="admin-payments.html" class="nav-btn">💰 Payments</a>
    <a href="adminpay.html" class="nav-btn">🏦 Withdraw</a>
    <a href="adminplayer.html" class="nav-btn">👥 Players</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Admin Dashboard</h1>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>🏆 Tournaments</h3>
        <p>Manage all tournaments</p>
      </div>

      <div class="card">
        <h3>💰 Payments</h3>
        <p>Handle deposits</p>
      </div>

      <div class="card">
        <h3>🏦 Withdraw</h3>
        <p>Approve withdrawals</p>
      </div>

      <div class="card">
        <h3>👥 Players</h3>
        <p>Manage users</p>
      </div>
    </div>

  </div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDIA2I6-htEdMxbxxsqKkeUlq86vJjOpRo",
authDomain:"hyperclutch.firebaseapp.com",
projectId:"hyperclutch",
appId:"1:781538384038:web:002bb30ad711c3deb3fc67"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const ADMIN_UID = "qeGyCVDkhdR3dVBPPqgbREjYMUT2";

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  auth.signInWithEmailAndPassword(email, password)
  .catch(err=>{
    error.innerText = err.message;
  });
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user && user.uid === ADMIN_UID){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

</script>

</body>
</html>
