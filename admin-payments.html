<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HyperClutch Admin - Payments</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { display: none; }

body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

h1, h2 {
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.buttons button{
    margin-left:5px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.approve{ background:#22c55e; }
.cancel{ background:#ef4444; }

.status-approved{ color:#22c55e; }
.status-cancelled{ color:#ef4444; }

.modal-bg{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<h1>💰 Payment Requests</h1>
<div class="container" id="requestsContainer"></div>

<h2>📜 Payment History</h2>
<div class="container" id="historyContainer"></div>

<div class="modal-bg" id="modal">
<div class="modal">
<p id="modalText"></p>
<button id="yes" class="approve">Yes</button>
<button id="no" class="cancel">No</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const ADMIN_UID="qeGyCVDkhdR3dVBPPqgbREjYMUT2";

firebase.initializeApp({
apiKey:"AIzaSyDIA2I6-htEdMxbxxsqKkeUlq86vJjOpRo",
authDomain:"hyperclutch.firebaseapp.com",
projectId:"hyperclutch",
databaseURL:"https://hyperclutch-default-rtdb.firebaseio.com/"
});

const auth=firebase.auth();
const db=firebase.firestore();
const rtdb=firebase.database();

// ✅ IMPORTANT FIX
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(user=>{
if(user && user.uid===ADMIN_UID){
document.body.style.display="block";
loadRequests();
loadHistory();
}else{
window.location="index.html";
}
});

let modalData={};
const modal=document.getElementById("modal");

document.getElementById("no").onclick=()=>modal.style.display="none";

document.getElementById("yes").onclick=()=>{
modal.style.display="none";
if(modalData.action==="approve") approvePayment(modalData);
else cancelPayment(modalData);
};

// LOAD REQUESTS
function loadRequests(){
db.collection("paymentRequests").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();

html+=`
<div class="card">
<div>
₹${d.amount}<br>
📱 ${d.phone}<br>
UTR: ${d.utr}
</div>

<div class="buttons">
<button onclick="openModal('approve','${doc.id}','${d.uid}',${d.amount},'${d.phone}','${d.utr}')" class="approve">Approve</button>
<button onclick="openModal('cancel','${doc.id}','${d.uid}',${d.amount},'${d.phone}','${d.utr}')" class="cancel">Cancel</button>
</div>
</div>
`;
});
document.getElementById("requestsContainer").innerHTML=html;
});
}

// LOAD HISTORY
function loadHistory(){
db.collection("paymentHistory").orderBy("time","desc")
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();

html+=`
<div class="card">
<div class="${d.status==='approved'?'status-approved':'status-cancelled'}">
${d.status.toUpperCase()} - ₹${d.amount}<br>
📱 ${d.phone}<br>
UTR: ${d.utr}
</div>
</div>
`;
});
document.getElementById("historyContainer").innerHTML=html;
});
}

// MODAL OPEN
function openModal(action,id,uid,amount,phone,utr){
modalData={action,docId:id,uid,amount,phone,utr};
document.getElementById("modalText").innerText=
action==="approve"?"Approve Payment?":"Cancel Payment?";
modal.style.display="flex";
}

// ✅ FIXED APPROVE FLOW
function approvePayment(data){

db.collection("paymentHistory").add({
uid:data.uid,
amount:data.amount,
status:"approved",
phone:data.phone,
utr:data.utr,
time:Date.now()
})

.then(()=>{
return rtdb.ref("users/"+data.uid+"/wallet")
.transaction(b=> (b||0)+data.amount);
})

.then(()=>{
return db.collection("paymentRequests").doc(data.docId).delete();
})

.then(()=>{
alert("✅ Approved");
})

.catch(err=>{
console.error(err);
alert("❌ "+err.message);
});

}

// CANCEL
function cancelPayment(data){

db.collection("paymentHistory").add({
uid:data.uid,
amount:data.amount,
status:"cancelled",
phone:data.phone,
utr:data.utr,
time:Date.now()
})

.then(()=>{
return db.collection("paymentRequests").doc(data.docId).delete();
})

.then(()=>{
alert("❌ Cancelled");
})

.catch(err=>{
console.error(err);
alert("❌ "+err.message);
});

}

</script>

</body>
</html>
